server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/estudy_plus?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: estudy123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: redis
      port: 6379

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

estudy:
  jwt:
    secret: eSt1ZHlQbHVzU2VjcmV0S2V5Rm9ySldUVG9rZW4yMDIz
    expiration: 1800000 # 30分钟（单位：毫秒）

dingtalk:
  app-key: ${DINGTALK_APP_KEY:ding_xxxxxxx}
  app-secret: ${DINGTALK_APP_SECRET:xxxxxx}
  agent-id: ${DINGTALK_AGENT_ID:123456789}
  callback-url: ${DINGTALK_CALLBACK_URL:http://localhost:8080/api/dingtalk/callback}
